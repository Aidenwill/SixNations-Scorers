<!doctype html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Six Nations Scoring Quiz</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="bg-shape bg-a"></div>
  <div class="bg-shape bg-b"></div>

  <main class="app">
    <header class="hero">
      <p class="eyebrow">Six Nations</p>
      <h1>Scoring Duel</h1>
      <p class="subtitle">Choose the player with the most historical points.</p>
    </header>

    <section id="player-input" class="panel">
      <h2>Start a Game</h2>
      <div class="row">
        <input id="player-name" type="text" maxlength="24" placeholder="Your name">
        <button id="start-game" class="btn primary">Play</button>
      </div>
    </section>

    <section id="game-play" class="panel hidden" aria-live="polite">
      <div class="stats">
        <div class="stat"><span>Round</span><strong id="round-number">0</strong></div>
        <div class="stat"><span>Streak</span><strong id="current-streak">0</strong></div>
        <div class="stat"><span>Best Streak</span><strong id="best-streak">0</strong></div>
      </div>

      <div class="duel-grid">
        <article class="card" data-player="1">
          <div class="team-badge" id="badge1"></div>
          <p class="team" id="player1-team">Team</p>
          <h3 id="player1-name">Player 1</h3>
          <button class="btn details" data-player="1">Details</button>
          <button class="btn choice" data-choice="1">Choose this player</button>
        </article>

        <div class="versus">VS</div>

        <article class="card" data-player="2">
          <div class="team-badge" id="badge2"></div>
          <p class="team" id="player2-team">Team</p>
          <h3 id="player2-name">Player 2</h3>
          <button class="btn details" data-player="2">Details</button>
          <button class="btn choice" data-choice="2">Choose this player</button>
        </article>
      </div>

      <div id="result-section" class="result hidden">
        <h3 id="result-message">Result</h3>
        <p id="result-detail"></p>
        <button id="next-round" class="btn primary">Next Round</button>
      </div>
    </section>

    <section id="game-over" class="panel hidden">
      <h2>Game Over</h2>
      <div id="final-stats" class="final-stats"></div>
      <button id="play-again" class="btn primary">Play Again</button>
    </section>

    <section class="panel">
      <h2>High Scores</h2>
      <div id="high-scores-list" class="scores"></div>
      <button id="export-scores" class="btn secondary">Export Scores (JSON)</button>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
