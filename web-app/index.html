<!doctype html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Six Nations Scoring Quiz</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="bg-shape bg-a"></div>
  <div class="bg-shape bg-b"></div>

  <main class="app">
    <header class="hero">
      <div class="hero-topbar">
        <p class="eyebrow" id="eyebrow-text">Six Nations</p>
        <label class="language-picker">
          <span class="language-indicator">
            <img id="current-language-flag" class="language-flag" src="assets/flags/fr.png" alt="Francais" width="20" height="14">
            <span id="language-label">Language</span>
          </span>
          <select id="language-select" aria-label="Language">
            <option value="fr">Francais</option>
            <option value="en">English</option>
            <option value="it">Italiano</option>
          </select>
        </label>
      </div>
      <h1 id="title-text">Scoring Duel</h1>
      <p id="subtitle-text" class="subtitle">Choose the player with the most scored points.</p>
    </header>

    <section class="panel info-panel" aria-label="Data information">
      <p id="info-text">
        Matches included: from 01-01-1971 to 09-03-2026.
        Before 1992, a try was worth 4 points.
      </p>
    </section>

    <section id="game-play" class="panel hidden" aria-live="polite">
      <div class="stats">
        <div class="stat"><span id="label-round">Round</span><strong id="round-number">0</strong></div>
        <div class="stat"><span id="label-streak">Streak</span><strong id="current-streak">0</strong></div>
        <div class="stat"><span id="label-best-streak">Best Streak</span><strong id="best-streak">0</strong></div>
      </div>

      <div class="duel-grid">
        <article class="card" data-player="1">
          <div class="team-badge" id="badge1"></div>
          <p class="team" id="player1-team">Team</p>
          <h3 id="player1-name">Player 1</h3>
          <p class="activity-years" id="player1-years"></p>
          <p class="player-score hidden" id="player1-score"></p>
          <button class="btn details hidden" data-player="1">Details</button>
          <button class="btn choice" data-choice="1" id="choose-player-1">Choose this player</button>
        </article>

        <div class="versus">VS</div>

        <article class="card" data-player="2">
          <div class="team-badge" id="badge2"></div>
          <p class="team" id="player2-team">Team</p>
          <h3 id="player2-name">Player 2</h3>
          <p class="activity-years" id="player2-years"></p>
          <p class="player-score hidden" id="player2-score"></p>
          <button class="btn details hidden" data-player="2">Details</button>
          <button class="btn choice" data-choice="2" id="choose-player-2">Choose this player</button>
        </article>
      </div>

      <div id="result-section" class="result hidden">
        <h3 id="result-message">Result</h3>
        <p id="result-detail"></p>
        <button id="next-round" class="btn primary">Next Round</button>
      </div>
    </section>

    <section id="game-over" class="panel hidden">
      <h2 id="game-over-title">Game Over</h2>
      <div id="final-stats" class="final-stats"></div>
      <button id="play-again" class="btn primary">Play Again</button>
    </section>


  </main>

  <script src="script.js"></script>
</body>
</html>
